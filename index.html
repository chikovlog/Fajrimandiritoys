<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem POS Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print { .no-print { display: none !important; } #printContainer { display: block !important; } }
        #printContainer { display: none; padding: 10px; font-family: monospace; width: 250px; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="printContainer"></div>

    <div id="app" class="p-6">
        <div class="mb-6 flex gap-4">
            <button onclick="switchView('kasir')" class="bg-blue-500 text-white px-4 py-2 rounded">Kasir</button>
            <button onclick="switchView('laporan')" class="bg-green-500 text-white px-4 py-2 rounded">Laporan</button>
            <button onclick="switchView('barang')" class="bg-purple-500 text-white px-4 py-2 rounded">Barang</button>
        </div>

        <div id="view-kasir" class="view">
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <h2 class="font-bold mb-2">Produk</h2>
                    <div id="productGrid" class="grid grid-cols-2 gap-2"></div>
                    <h2 class="font-bold mt-6 mb-2">History Penjualan Hari Ini</h2>
                    <div id="kasirHistory" class="bg-white p-4 rounded shadow"></div>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="font-bold mb-4">Keranjang</h2>
                    <div id="cartList"></div>
                    <button id="btnCheckout" class="w-full bg-green-600 text-white p-3 mt-4 rounded font-bold">Proses Transaksi</button>
                </div>
            </div>
        </div>

        <div id="view-laporan" class="view hidden">
            <h2 class="font-bold text-xl mb-4">Riwayat Transaksi</h2>
            <table class="w-full bg-white shadow rounded">
                <thead><tr class="border-b"><th class="p-2">Waktu</th><th class="p-2">Total</th><th class="p-2">Aksi</th></tr></thead>
                <tbody id="riwayatTableBody"></tbody>
            </table>
        </div>

        <div id="view-barang" class="view hidden">
            <form id="formBarang" class="bg-white p-6 rounded shadow max-w-lg">
                <input type="hidden" id="editId">
                <input type="text" id="itemSku" placeholder="SKU" class="block w-full border p-2 mb-2" required>
                <input type="text" id="itemName" placeholder="Nama Barang" class="block w-full border p-2 mb-2" required>
                <input type="number" id="itemHpp" placeholder="HPP (Modal)" oninput="calculatePriceFromMargin()" class="block w-full border p-2 mb-2" required>
                <div class="flex gap-2">
                    <input type="number" id="itemMargin" value="30" oninput="calculatePriceFromMargin()" placeholder="Margin %" class="w-1/2 border p-2 mb-2">
                    <input type="number" id="itemPrice" placeholder="Harga Jual" oninput="calculateMarginFromPrice()" class="w-1/2 border p-2 mb-2" required>
                </div>
                <input type="number" id="itemStock" placeholder="Stok" class="block w-full border p-2 mb-2" required>
                <button type="submit" class="bg-blue-600 text-white w-full p-2">Simpan Barang</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
