<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem POS & Kasir Terpadu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Bypass untuk Mesin Printer Thermal (Lokal / Wireless) */
        #printSection {
            display: none;
        }
        @media print {
            body * {
                display: none !important;
            }
            #printSection, #printSection * {
                display: block !important;
                visibility: visible !important;
            }
            #printSection {
                position: absolute;
                left: 0;
                top: 0;
                width: 100% !important;
                max-width: 300px !important;
                font-family: monospace !important;
                background: white !important;
                color: black !important;
                padding: 10px !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-300 min-h-screen flex flex-col">

    <header class="bg-white dark:bg-gray-800 shadow-md p-4 flex justify-between items-center sticky top-0 z-50 transition-colors">
        <div class="flex items-center gap-3">
            <i class="fas fa-store text-blue-600 dark:text-blue-400 text-2xl"></i>
            <h1 class="text-xl font-bold hidden md:block">Smart POS</h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon text-xl" id="themeIcon"></i>
            </button>
            
            <div id="userMenu" class="hidden flex items-center gap-4 border-l pl-4 dark:border-gray-600">
                <span id="userNameDisplay" class="font-semibold text-sm uppercase"></span>
                <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <main id="loginPage" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md transition-colors">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold mb-2">Selamat Datang</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Silakan login untuk mengakses sistem</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-md">
                    Masuk
                </button>
            </form>
            <div class="mt-6 text-xs text-gray-400 dark:text-gray-500 text-center">
                <p>Akses Kasir: kasir / kasir123</p>
                <p>Akses Owner: owner / owner123</p>
            </div>
        </div>
    </main>

    <div id="mainApp" class="hidden flex-grow flex flex-col md:flex-row overflow-hidden">
        
        <aside class="w-full md:w-64 bg-white dark:bg-gray-800 shadow-md md:h-[calc(100vh-72px)] overflow-y-auto transition-colors z-40">
            <nav class="p-4 space-y-2">
                <button class="nav-btn w-full text-left p-3 rounded-lg hover:bg-blue-50 dark:hover:bg-gray-700 text-blue-600 dark:text-blue-400 font-medium transition flex items-center gap-3 bg-blue-50 dark:bg-gray-700" data-target="view-kasir">
                    <i class="fas fa-cash-register w-5 text-center"></i> Kasir / Transaksi
                </button>
                <button class="nav-btn w-full text-left p-3 rounded-lg hover:bg-blue-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 font-medium transition flex items-center gap-3" data-target="view-stok">
                    <i class="fas fa-boxes w-5 text-center"></i> Cek Stok Barang
                </button>
                
                <div id="ownerMenus" class="hidden space-y-2 pt-4 border-t dark:border-gray-600 mt-4">
                    <p class="text-xs font-bold text-gray-400 px-3 uppercase">Menu Owner</p>
                    <button class="nav-btn w-full text-left p-3 rounded-lg hover:bg-blue-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 font-medium transition flex items-center gap-3" data-target="view-kelola-barang">
                        <i class="fas fa-box-open w-5 text-center"></i> Kelola Barang
                    </button>
                    <button class="nav-btn w-full text-left p-3 rounded-lg hover:bg-blue-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 font-medium transition flex items-center gap-3" data-target="view-laporan">
                        <i class="fas fa-chart-line w-5 text-center"></i> Laporan Keuangan
                    </button>
                </div>
            </nav>
        </aside>

        <section class="flex-grow bg-gray-100 dark:bg-gray-900 md:h-[calc(100vh-72px)] overflow-y-auto p-4 md:p-6 transition-colors">
            
            <div id="view-kasir" class="view-section hidden grid grid-cols-1 xl:grid
